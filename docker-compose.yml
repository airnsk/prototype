  # === Data Plane: Server Agent ===
  server-agent:
    build:
      context: .
      dockerfile: server_agent/Dockerfile
    container_name: ztna-server
    hostname: server-agent
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - control-plane
      - data-plane
    environment:
      - ZTNA_NODE=server-agent
      - ZTNA_CONTROLLER_URL=http://controller:8000
      - ZTNA_TELEMETRY_URL=http://telemetry:8000
      - ZTNA_KEY_STORE_PATH=/app/keys/server_keys.json
      - ZTNA_CONTROLLER_PK_PATH=/app/keys/controller.pk
    volumes:
      - ./keys:/app/keys:ro
      - ./server_agent/config:/app/config:ro
    depends_on:
      - controller
      - telemetry
      - protected-service-1
      - protected-service-2
      - protected-service-3
      - protected-service-4
      - protected-service-5
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # === VPN (Baseline) ===
  vpn-client:
    build:
      context: .
      dockerfile: vpn/Dockerfile.client
    container_name: ztna-vpn-client
    hostname: vpn-client
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - control-plane
      - data-plane
    volumes:
      - ./vpn/certs:/etc/openvpn/certs:ro
    depends_on:
      - vpn-server
    command: sleep infinity

  vpn-server:
    build:
      context: .
      dockerfile: vpn/Dockerfile
    container_name: ztna-vpn-server
    hostname: vpn-server
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - control-plane
      - data-plane
    ports:
      - "1194:1194/udp"
    volumes:
      - ./vpn/certs:/etc/openvpn/certs:ro
    command: openvpn --config /etc/openvpn/server.conf

  # === Gateway-ZTNA (Baseline) ===
  gateway-ztna:
    build:
      context: .
      dockerfile: gateway_ztna/Dockerfile
    container_name: ztna-gateway
    hostname: gateway-ztna
    networks:
      - control-plane
      - data-plane
    ports:
      - "8443:8443"
    depends_on:
      - protected-service-1
      - protected-service-2
      - protected-service-3
      - protected-service-4
      - protected-service-5

  # === Protected Services (S1, S2, S3) ===
  protected-service-1:
    build:
      context: .
      dockerfile: protected_service/Dockerfile
    container_name: ztna-protected-service-1
    hostname: protected-service-1
    networks:
      data-plane:
        ipv4_address: 172.21.0.50
    environment:
      - ZTNA_NODE=protected-service-1
      - SERVICE_ID=protected-service-1
    ports:
      - "8090:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  protected-service-2:
