      - ZTNA_IDP_URL=http://mock-idp:8000
      - ZTNA_TELEMETRY_URL=http://telemetry:8000
      - ZTNA_KEY_STORE_PATH=/app/keys/client_keys.json
      - ZTNA_CONTROLLER_PK_PATH=/app/keys/controller.pk
    volumes:
      - ./keys:/app/keys:ro
      - ./client_agent/config:/app/config:ro
    depends_on:
      - controller
