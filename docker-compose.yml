networks:
  control-plane:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  data-plane:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  controller-keys:
  client-keys:
  server-keys:
