version: "3.9"

services:
  # === Control Plane ===
  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: ztna-controller
    hostname: controller
    networks:
      - control-plane
    environment:
      - ZTNA_NODE=controller
      - ZTNA_CONTROLLER_SK_PATH=/app/keys/controller.sk
      - ZTNA_CONTROLLER_PK_PATH=/app/keys/controller.pk
      - ZTNA_IDP_URL=http://mock-idp:8000
      - ZTNA_TELEMETRY_URL=http://telemetry:8000
      - ZTNA_REGISTRY_PATH=/app/config/registry.json
    volumes:
      - ./keys:/app/keys:ro
      - ./controller/config:/app/config:ro
    ports:
      - "8080:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  mock-idp:
    build:
      context: .
      dockerfile: mock_idp/Dockerfile
    container_name: ztna-mock-idp
    hostname: mock-idp
    networks:
      - control-plane
    environment:
      - ZTNA_NODE=mock-idp
    volumes:
      - ./mock_idp/users.json:/app/users.json:ro
    ports:
      - "8081:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  telemetry:
    build:
      context: .
      dockerfile: telemetry_server/Dockerfile
    container_name: ztna-telemetry
    hostname: telemetry
    networks:
      - control-plane
    environment:
      - ZTNA_NODE=telemetry
    ports:
      - "8082:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # === Client Agents (10 users) ===

  client-01:
    build:
      context: .
      dockerfile: client_agent/Dockerfile
    container_name: ztna-client-01
    hostname: client-01
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - control-plane
      - data-plane
    environment:
      - ZTNA_NODE=client-01
      - ZTNA_USER_NAME=user01
      - ZTNA_USER_TOKEN=bearer-user01-token-85421c1a4d5a0b18
      - ZTNA_CONTROLLER_URL=http://controller:8000
      - ZTNA_IDP_URL=http://mock-idp:8000
      - ZTNA_TELEMETRY_URL=http://telemetry:8000
      - ZTNA_KEY_STORE_PATH=/app/keys/client_keys.json
      - ZTNA_CONTROLLER_PK_PATH=/app/keys/controller.pk
    volumes:
      - ./keys:/app/keys:ro
      - ./client_agent/config:/app/config:ro
    depends_on:
      - controller
      - mock-idp
      - telemetry
    command: sleep infinity

  client-02:
    build:
      context: .
      dockerfile: client_agent/Dockerfile
    container_name: ztna-client-02
    hostname: client-02
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
