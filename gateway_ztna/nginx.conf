server {
    listen 8443 ssl;
    server_name gateway-ztna;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    auth_basic "ZTNA Gateway";
    auth_basic_user_file /etc/nginx/htpasswd;

    location / {
        proxy_pass http://protected-service-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /s1/ {
        proxy_pass http://protected-service-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
    }

    location /s2/ {
        proxy_pass http://protected-service-2:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
    }

    location /s3/ {
        proxy_pass http://protected-service-3:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
    }

    location /s4/ {
        proxy_pass http://protected-service-4:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
    }

    location /s5/ {
        proxy_pass http://protected-service-5:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Authenticated-User $remote_user;
    }
}
